<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome</title>
    <style>
        *{padding: 0; margin: 0;box-sizing: border-box;}
    </style>
</head>
<body>
    <main>
        <style>
             main{min-height: 100vh;  width: 100%; height: 100%;  background-size: 65px 65px;
            background-image: repeating-radial-gradient(  #0c0a0a 80%,#2a2c2a 90%,#373c3f 90%); }
        </style>

        <div class="login">
            <style>
                .user-profile {  width: 131px;  height: 51px;  border-radius: 15px;  cursor: pointer;
                transition: 0.3s ease;  background: linear-gradient(to bottom right, #2e8eff 0%, rgba(46, 142, 255, 0) 30%);
                background-color: rgba(46, 142, 255, 0.2); display: flex; align-items: center; justify-content: center; }

                .user-profile:hover,.user-profile:focus {  background-color: rgba(46, 142, 255, 0.7);  
                    box-shadow: 0 0 10px rgba(46, 142, 255, 0.5);  outline: none; }

                .user-profile-inner {  width: 127px;  height: 47px;  border-radius: 13px;  background-color: #1a1a1a;  display: flex;
                align-items: center;  justify-content: center;  gap: 15px;  color: #fff;  font-weight: 600; }

                .user-profile-inner svg {  width: 27px;  height: 27px;  fill: #fff;}
            </style>
            <div class="user-profile">   
                <div class="user-profile-inner">
                    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g data-name="Layer 2" id="Layer_2">
                            <path d="m15.626 11.769a6 6 0 1 0 -7.252 0 9.008 9.008 0 0 0 -5.374 8.231 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 9.008 9.008 0 0 0 -5.374-8.231zm-7.626-4.769a4 4 0 1 1 4 4 4 4 0 0 1 -4-4zm10 14h-12a1 1 0 0 1 -1-1 7 7 0 0 1 14 0 1 1 0 0 1 -1 1z"></path>
                        </g>
                    </svg>
                    <p>Log In</p>
                </div>
            </div>
        </div>

        <div>
            <style>
                .form-control {
                position: relative;
                margin: 20px 0 40px;
                width: 190px;
                }

                .form-control input {
                background-color: transparent;
                border: 0;
                border-bottom: 2px #fff solid;
                display: block;
                width: 100%;
                padding: 15px 0;
                font-size: 18px;
                color: #fff;
                }

                .form-control input:focus,
                .form-control input:valid {
                outline: 0;
                border-bottom-color: lightblue;
                }

                .form-control label {
                position: absolute;
                top: 15px;
                left: 0;
                pointer-events: none;
                }

                .form-control label span {
                display: inline-block;
                font-size: 18px;
                min-width: 5px;
                color: #fff;
                transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
                }

                .form-control input:focus+label span,
                .form-control input:valid+label span {
                color: lightblue;
                transform: translateY(-30px);
                }
            </style>
            <div class="form-control">
                <input type="value" required="">
                <label>
                    <span style="transition-delay:0ms">U</span><span style="transition-delay:50ms">s</span><span style="transition-delay:100ms">e</span><span style="transition-delay:150ms">r</span><span style="transition-delay:200ms">n</span><span style="transition-delay:250ms">a</span><span style="transition-delay:300ms">m</span><span style="transition-delay:350ms">e</span>
                </label>
            </div>
        </div>

        <div>
            <style>
                .group { position: relative;}

.input {
 font-size: 16px;
 padding: 10px 10px 10px 5px;
 display: block;
 width: 200px;
 border: none;
 border-bottom: 1px solid #515151;
 background: transparent;
}

.input:focus {
 outline: none;
}

label {
 color: #999;
 font-size: 18px;
 font-weight: normal;
 position: absolute;
 pointer-events: none;
 left: 5px;
 top: 10px;
 -webkit-transition: 0.2s ease all;
 -moz-transition: 0.2s ease all;
 transition: 0.2s ease all;
}

.input:focus ~ label, .input:valid ~ label {
 top: -20px;
 font-size: 14px;
 color: #5264AE;
}

.bar {
 position: relative;
 display: block;
 width: 200px;
}

.bar:before, .bar:after {
 content: '';
 height: 2px;
 width: 0;
 bottom: 1px;
 position: absolute;
 background: #5264AE;
 -webkit-transition: 0.2s ease all;
 -moz-transition: 0.2s ease all;
 transition: 0.2s ease all;
}

.bar:before {
 left: 50%;
}

.bar:after {
 right: 50%;
}

.input:focus ~ .bar:before, .input:focus ~ .bar:after {
 width: 50%;
}

.highlight {
 position: absolute;
 height: 60%;
 width: 100px;
 top: 25%;
 left: 0;
 pointer-events: none;
 opacity: 0.5;
}

.input:focus ~ .highlight {
 animation: inputHighlighter 0.3s ease;
}

@keyframes inputHighlighter {
 from {
  background: #5264AE;
 }

 to {
  width: 0;
  background: transparent;
 }
}

            </style>
            <div class="group">
            <input required="" type="text" class="input">
            <span class="highlight"></span>
            <span class="bar"></span>
            <label>Name</label>
            </div>
        </div>

        <div>
            <style>
                .heart-container {
                --heart-color: rgb(255, 91, 137);
                position: relative;
                width: 50px;
                height: 50px;
                transition: .3s;
                }

                .heart-container .checkbox {
                position: absolute;
                width: 100%;
                height: 100%;
                opacity: 0;
                z-index: 20;
                cursor: pointer;
                }

                .heart-container .svg-container {
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                }

                .heart-container .svg-outline,
                        .heart-container .svg-filled {
                fill: var(--heart-color);
                position: absolute;
                }

                .heart-container .svg-filled {
                animation: keyframes-svg-filled 1s;
                display: none;
                }

                .heart-container .svg-celebrate {
                position: absolute;
                animation: keyframes-svg-celebrate .5s;
                animation-fill-mode: forwards;
                display: none;
                stroke: var(--heart-color);
                fill: var(--heart-color);
                stroke-width: 2px;
                }

                .heart-container .checkbox:checked~.svg-container .svg-filled {
                display: block
                }

                .heart-container .checkbox:checked~.svg-container .svg-celebrate {
                display: block
                }

                @keyframes keyframes-svg-filled {
                0% {
                    transform: scale(0);
                }

                25% {
                    transform: scale(1.2);
                }

                50% {
                    transform: scale(1);
                    filter: brightness(1.5);
                }
                }

                @keyframes keyframes-svg-celebrate {
                0% {
                    transform: scale(0);
                }

                50% {
                    opacity: 1;
                    filter: brightness(1.5);
                }

                100% {
                    transform: scale(1.4);
                    opacity: 0;
                    display: none;
                }
                }

            </style>
            <div class="heart-container" title="Like">
                <input type="checkbox" class="checkbox" id="Give-It-An-Id">
                <div class="svg-container">
                    <svg viewBox="0 0 24 24" class="svg-outline" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.5,1.917a6.4,6.4,0,0,0-5.5,3.3,6.4,6.4,0,0,0-5.5-3.3A6.8,6.8,0,0,0,0,8.967c0,4.547,4.786,9.513,8.8,12.88a4.974,4.974,0,0,0,6.4,0C19.214,18.48,24,13.514,24,8.967A6.8,6.8,0,0,0,17.5,1.917Zm-3.585,18.4a2.973,2.973,0,0,1-3.83,0C4.947,16.006,2,11.87,2,8.967a4.8,4.8,0,0,1,4.5-5.05A4.8,4.8,0,0,1,11,8.967a1,1,0,0,0,2,0,4.8,4.8,0,0,1,4.5-5.05A4.8,4.8,0,0,1,22,8.967C22,11.87,19.053,16.006,13.915,20.313Z">
                        </path>
                    </svg>
                    <svg viewBox="0 0 24 24" class="svg-filled" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.5,1.917a6.4,6.4,0,0,0-5.5,3.3,6.4,6.4,0,0,0-5.5-3.3A6.8,6.8,0,0,0,0,8.967c0,4.547,4.786,9.513,8.8,12.88a4.974,4.974,0,0,0,6.4,0C19.214,18.48,24,13.514,24,8.967A6.8,6.8,0,0,0,17.5,1.917Z">
                        </path>
                    </svg>
                    <svg class="svg-celebrate" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="10,10 20,20"></polygon>
                        <polygon points="10,50 20,50"></polygon>
                        <polygon points="20,80 30,70"></polygon>
                        <polygon points="90,10 80,20"></polygon>
                        <polygon points="90,50 80,50"></polygon>
                        <polygon points="80,80 70,70"></polygon>
                    </svg>
                </div>
            </div>
        </div>

        
    </main>
</body>
</html>
